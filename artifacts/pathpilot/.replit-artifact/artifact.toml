kind = "web"
previewPath = "/"
title = "PathPilot"
version = "1.0.0"
id = "artifacts/pathpilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20169

[services.development]
run = "pnpm --filter @workspace/pathpilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pathpilot", "run", "build" ]
publicDir = "artifacts/pathpilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20169"
BASE_PATH = "/"
